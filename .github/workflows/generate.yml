name: Generate news

on:
  workflow_dispatch:
  schedule:
    - cron: "40 22 * * *"
    - cron: "40 8 * * *"
    - cron: "40 9 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/configure-pages@v6

      - name: Install Perl SSL dependencies
        run: sudo apt-get install -y libio-socket-ssl-perl libnet-ssleay-perl

      - name: Generate static files
        env:
          RSS_SOURCES: ${{ secrets.RSS_SOURCES }}
          API_SOURCES: ${{ secrets.API_SOURCES }}
          VIEW_PASSWORD: ${{ secrets.VIEW_PASSWORD }}
        run: perl bin/generate.pl

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data state docs
          git diff --cached --quiet || git commit -m "Generate news"
          git push

      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v5
