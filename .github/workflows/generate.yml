name: Generate news

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"   # 07:00 JST → am edition
    - cron: "0 6 * * *"    # 15:00 JST → pm edition

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - name: Generate static files
        env:
          RSS_SOURCES: ${{ secrets.RSS_SOURCES }}
          API_SOURCES: ${{ secrets.API_SOURCES }}
          VIEW_PASSWORD: ${{ secrets.VIEW_PASSWORD }}
        run: perl bin/generate.pl

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data state docs
          git diff --cached --quiet || git commit -m "Generate news"
          git push

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
